name: Ejecucion ROPC - Nivel 5

# 1. ¿Cuándo se ejecuta esto? Cada vez que hagamos un 'push' a la rama principal.
on:
  push:
    branches: [ "main" ]

jobs:
  pruebas-api:
    runs-on: ubuntu-latest # Una máquina virtual limpia de Linux en la nube

    steps:
      # 2. Clona tu código fuente en la máquina virtual
      - name: Descargar codigo fuente
        uses: actions/checkout@v4

      # 3. Instala Java 17 en la máquina virtual
      - name: Configurar Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 4. EL TRUCO DE DEVOPS: Creamos el archivo de secretos en el aire
      # Usaremos las variables de entorno seguras (Secrets) de tu repositorio de GitHub
      - name: Generar secrets.properties dinamicamente
        run: |
          mkdir -p config
          echo "CLIENT_ID=${{ secrets.CLIENT_ID }}" >> config/secrets.properties
          echo "CLIENT_SECRET=${{ secrets.CLIENT_SECRET }}" >> config/secrets.properties
          echo "USERNAME=${{ secrets.USERNAME }}" >> config/secrets.properties
          echo "PASSWORD=${{ secrets.PASSWORD }}" >> config/secrets.properties

      # 5. Ejecutamos la prueba exactamente igual que en tu consola local
      - name: Ejecutar pruebas Karate
        run: mvn clean test -Dtest=KarateRunner