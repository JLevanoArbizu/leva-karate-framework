name: Ejecucion ROPC - Nivel 5

# 1. ¿Cuándo se ejecuta esto? Cada vez que hagamos un 'push' a la rama principal.
on:
  push:
    branches: [ "main" ]

jobs:
  pruebas-api:
    runs-on: ubuntu-latest # Una máquina virtual limpia de Linux en la nube

    steps:
      # 2. Clona tu código fuente en la máquina virtual
      - name: Descargar codigo fuente
        uses: actions/checkout@v4

      # 3. Instala Java 17 en la máquina virtual
      - name: Configurar Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 4 Eliminamos el paso de "Generar secrets dinámicamente"

      # 5. Ejecutamos la prueba inyectando las variables de entorno en la memoria
      - name: Ejecutar pruebas Karate
        env:
          AZURE_CLIENT_ID: ${{ secrets.CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          AZURE_USERNAME: ${{ secrets.USERNAME }}
          AZURE_PASSWORD: ${{ secrets.PASSWORD }}
        run: mvn clean test -Dtest=KarateRunner